name: Laravel CI-CD

on:
  push:
    branches: ["main"]

jobs:
  # =========================
  # 🧪 LARAVEL TEST
  # =========================
  laravel-tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: spjjtrust
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql

      # 3. Install Composer Dependencies (WAJIB sebelum artisan)
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 4. Setup .env
      - name: Setup .env
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=spjjtrust/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=root/' .env

      # 5. Generate key
      - name: Generate Key
        run: php artisan key:generate

      # 6. Clear config (biar .env kebaca)
      - name: Clear Config
        run: php artisan config:clear

      # 7. Permission
      - name: Set Permissions
        run: chmod -R 777 storage bootstrap/cache

      # 8. Tunggu MySQL ready
      - name: Wait for MySQL
        run: |
          for i in {1..15}; do
            nc -z 127.0.0.1 3306 && echo "MySQL ready" && exit 0
            echo "Waiting MySQL..."
            sleep 3
          done
          exit 1

      # 9. Migrate & Test
      - name: Run Migration & Tests
        run: |
          php artisan migrate --force
          php artisan test

  # =========================
  # 🐳 DOCKER BUILD & PUSH
  # =========================
  docker-build:
    runs-on: ubuntu-latest
    needs: laravel-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ Login Docker Hub (WAJIB secrets benar)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ✅ Build & Push
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: shavira/spjjtrust:latest